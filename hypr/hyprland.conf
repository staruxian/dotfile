# ~/.config/hypr/hyprland.conf

################
### MONITORS ###
################
monitor=eDP-1,1920x1080@60,0x0,1.25
monitor=,preferred,auto,1

###################
### MY PROGRAMS ###
###################
$terminal = ghostty
$menu = wmenu-run
$fileManager = thunar
$browser = firefox

#################
### AUTOSTART ###
#################
exec-once = mako
exec-once = waybar
exec-once = hyprpaper & sleep 1 && hyprctl hyprpaper wallpaper 'eDP-1,~/.config/hypr/wallpaper.jpg,cover'
exec-once = impala
#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1

    col.active_border = rgb(89b4fa)
    col.inactive_border = rgb(1e2030)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = false
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############
input {
    kb_layout = us

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }

    sensitivity = 0
}

cursor {
    inactive_timeout = 0
}

####################
### KEYBINDINGSS ###
####################
$mainMod = SUPER

# Core
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, W, killactive
bind = $mainMod, D, exec, $menu
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod SHIFT, E, exec, hyprctl dispatch exit
bind = $mainMod SHIFT, L, exec, hyprlock
bind = $mainMod SHIFT, R, exec, killall waybar; waybar &

# App Shortcuts
bind = $mainMod SHIFT, F, exec, $fileManager
bind = $mainMod SHIFT, B, exec, $browser
bind = $mainMod SHIFT, G, exec, firefox --new-tab https://mail.google.com/mail/u/1/
bind = $mainMod, SPACE, exec, rofi -show drun
bind = $mainMod SHIFT, T, exec, Telegram

# Move focus (vim keys)
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move container to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Floating
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Audio
bindel = ,XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = ,XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%; [ $(pactl get-sink-volume @DEFAULT_SINK@ | grep -Po '\d+(?=%)' | head -n 1) -gt 100 ] && pactl set-sink-volume @DEFAULT_SINK@ 100%

# Brightness
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+

# Screenshot
bind = ,Print, exec, mkdir -p ~/Pictures && grim -g "$(slurp)" - | tee ~/Pictures/$(date +%Y-%m-%d_%H-%M-%S).png | wl-copy && notify-send -t 10000 'Screenshot' 'Selected area saved to Pictures & Clipboard'
